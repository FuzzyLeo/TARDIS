name: Release to Workshop

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Test the code round-trip + Steam login but skip the actual Workshop upload. Defaults on - untick only to deliberately publish to STABLE."
        type: boolean
        default: true
      tag:
        description: "Preview only: resolve this release tag's notes and log the change note (no login, no upload)"
        type: string
        default: ""

permissions:
  contents: read

jobs:
  publish:
    uses: AmyJeanes/gmod-addon-tools/.github/workflows/publish-workshop.yml@2d6fd313362d074b692004942eb3c3ef4597b77a # v0.28.2
    with:
      addon: "TARDIS"
      workshop_id: "307175678"
      mfa: true
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
      version: ${{ github.event.release.tag_name }}
      release_url: ${{ github.event.release.html_url }}
      release_body: ${{ github.event.release.body }}
      preview_tag: ${{ github.event.inputs.tag }}
    secrets:
      STEAM_USERNAME: ${{ secrets.STEAM_RELEASE_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_RELEASE_PASSWORD }}
      HA_WEBHOOK_URL: ${{ secrets.HA_WEBHOOK_URL }}
      NTFY_CI_PASSWORD: ${{ secrets.NTFY_CI_PASSWORD }}
